version: "2"
linters:
  enable:
    - gosec
    - misspell
    - unconvert
    - unparam
  settings:
    errcheck:
      exclude-functions:
        - (*github.com/godbus/dbus/v5.Conn).Export
        - (*github.com/godbus/dbus/v5.Conn).Emit
    gosec:
      excludes:
        - G104
        - G115
        - G117  # Struct field "Secret" is domain data, not a credential
        - G204  # Subprocess args are controlled (systemctl, dbus-daemon)
        - G306  # Systemd unit files should be world-readable (0644)
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - lll
        path: _test\.go
      - linters:
          - unparam
        text: always receives
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/nikicat/gopass-secret-service
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
